<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>멘토링 관리자 통계</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:'Noto Sans KR',sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
margin-bottom:10px;
}

h2{
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#2f5bea;
color:white;
}

input{
padding:6px;
margin-top:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>멘토링 관리자 통계</h1>

<div>

<input id="searchMentor" placeholder="멘토 검색">
<input id="searchMentee" placeholder="멘티 검색">

</div>

<h2>멘토 · 분야별 회기</h2>

<table id="mentorTable">

<thead>
<tr>
<th>멘토</th>
<th>분야</th>
<th>회기</th>
</tr>
</thead>

<tbody></tbody>

</table>


<h2>멘티 · 분야별 회기</h2>

<table id="menteeTable">

<thead>
<tr>
<th>멘티</th>
<th>분야</th>
<th>회기</th>
</tr>
</thead>

<tbody></tbody>

</table>


<h2>분야별 총 회기</h2>

<table id="fieldTable">

<thead>
<tr>
<th>분야</th>
<th>회기</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyCQ_puEGRMy3HEKe1WozrJ2TgLVT2OG4oE",
authDomain: "mentoring-4287b.firebaseapp.com",
projectId: "mentoring-4287b",
storageBucket: "mentoring-4287b.firebasestorage.app",
messagingSenderId: "718576579632",
appId: "1:718576579632:web:04f51457d9a6a1febae9f5"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


let logs=[];


async function load(){

const snap=await getDocs(collection(db,"sessions"));

logs=snap.docs.map(d=>d.data());

render();

}


function render(){

const mentorMap={};

const menteeMap={};

const fieldMap={};


logs.forEach(l=>{

const mentor=l.mentor?.name||"";

const field=l.field||"미분류";


const mentorKey=mentor+"-"+field;

mentorMap[mentorKey]=(mentorMap[mentorKey]||0)+1;


fieldMap[field]=(fieldMap[field]||0)+1;


(l.mentees||[]).forEach(m=>{

const menteeKey=m+"-"+field;

menteeMap[menteeKey]=(menteeMap[menteeKey]||0)+1;

});

});


const mentorBody=document.querySelector("#mentorTable tbody");

mentorBody.innerHTML="";


Object.keys(mentorMap).forEach(k=>{

const [mentor,field]=k.split("-");

mentorBody.innerHTML+=`

<tr>
<td>${mentor}</td>
<td>${field}</td>
<td>${mentorMap[k]}</td>
</tr>

`;

});


const menteeBody=document.querySelector("#menteeTable tbody");

menteeBody.innerHTML="";


Object.keys(menteeMap).forEach(k=>{

const [mentee,field]=k.split("-");

menteeBody.innerHTML+=`

<tr>
<td>${mentee}</td>
<td>${field}</td>
<td>${menteeMap[k]}</td>
</tr>

`;

});


const fieldBody=document.querySelector("#fieldTable tbody");

fieldBody.innerHTML="";


Object.keys(fieldMap).forEach(f=>{

fieldBody.innerHTML+=`

<tr>
<td>${f}</td>
<td>${fieldMap[f]}</td>
</tr>

`;

});

}


load();

</script>

</body>
</html>
